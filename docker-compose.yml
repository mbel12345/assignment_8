# This Docker Compose file defines and configures the services required to run the FastAPI Calculator application.

services:
  web:
    build: . # Build using the Dockerfile in the current directory
    container_name: fastapi_calculator
    ports:
      - "8000:8000" # Map port 8000 on the host to port 8000 inside the container
    volumes:
      - .:/app # Mount the current directory on the host to /app in the container
    environment:
      - PYTHONDONTWRITEBYTECODE=1 # Prevent Python from writing .pyc files to disk, keeping the container clean
      - PYTHONUNBUFFERED=1 # Force Python to flush the output buffer immediately, for realtime logging
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload # Main command that the container will be running
