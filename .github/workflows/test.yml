name: CI/CD

on:
  push:
    branches:
      - '**' # Run tests on push to any branch, so that features are validated before merging into main
  pull_request:
    branches:
      - main # Run tests on any pull request to the main branch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - uses: actions/cache@v3
        with:
          path: |
            venv
            ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
          playwright install

      - name: Run tests
        run: |
          source venv/bin/activate
          pytest tests/unit/ --cov=src --junitxml=test-results/junit.xml
          pytest tests/integration/
          pytest tests/e2e

  security:
    needs: test
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v4

      - name: Build Image
        run: docker build -t app:test .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'app:test'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  deploy:
    needs: security
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:

      - uses: actions/checkout@v4

      - uses: docker/steup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          user: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            mbel12345/assignment_8:latest
            mbel12345/assignment_8:${{ github.sha }}
          platform: linux/amd64,linux/arm64
          cache-from: type=registry,ref=mbel12345/assignment_8:cache
          cache-to: type=inline,mode=max
